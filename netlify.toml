# Static SPA deploy. Works as-is on Netlify; Cloudflare Pages / Vercel use the
# same `npm run build` -> `dist/` output (set those in their dashboards).
[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback so deep links resolve to the app shell.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
