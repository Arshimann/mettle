<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/pwa-192.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#fbfbf9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Mettle" />
    <title>Mettle</title>
    <!-- Set the theme before paint to avoid a flash of the wrong palette. -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('mettle.v1');
          var theme = 'light';
          if (raw) {
            var parsed = JSON.parse(raw);
            theme = (parsed && parsed.state && parsed.state.settings && parsed.state.settings.theme) || 'light';
          }
          document.documentElement.dataset.theme = theme;
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
